name: eventkuy
description: "EventKuy - Platform informasi event terbaik: Seminar, Workshop, Bootcamp, Lomba, dan Webinar."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.9.0
  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.6.3

  # UI Components
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  carousel_slider: ^5.0.0
  smooth_page_indicator: ^1.2.0
  flutter_staggered_animations: ^1.1.1

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.1
  share_plus: ^10.0.0
  http: ^1.2.2
  sqflite_common_ffi: ^2.4.2
  sqlite3_flutter_libs: ^0.6.0+eol

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
